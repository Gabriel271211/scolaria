<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>ScolarIA</title>
<meta name="theme-color" content="#8b6fff">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ── TOKENS ── */
:root{
  --bg:#0a0a12;--surf:#111120;--card:#181828;--bord:#1e1e32;
  --a1:#8b6fff;--a2:#ff6b9d;--tx:#e2e2f0;--mu:#4a4a6a;
  --fb:'IBM Plex Sans',sans-serif;--fd:'IBM Plex Sans',sans-serif;
  --hdr:44px;--side:220px;--drawer:272px;
  --radius:10px;
}

/* ── RESET ── */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{
  height:100%;background:var(--bg);color:var(--tx);
  font-family:var(--fb);overflow:hidden;
  -webkit-font-smoothing:antialiased;
}

/* ── SHELL ── */
#shell{
  display:flex;flex-direction:column;
  width:100%;height:100%;overflow:hidden;
}

/* ═══════════════════════════
   HEADER MOBILE (sans logo — l'app a le sien)
═══════════════════════════ */
#hdr{
  height:var(--hdr);flex-shrink:0;
  background:var(--surf);
  border-bottom:1px solid var(--bord);
  display:flex;align-items:center;
  padding:0 12px;gap:10px;
  position:relative;z-index:300;
}
#hdr::after{
  content:'';position:absolute;bottom:0;left:0;right:0;
  height:1px;background:linear-gradient(90deg,var(--a1),var(--a2));opacity:.5;
}

/* Hamburger */
#menu-btn{
  width:34px;height:34px;border-radius:8px;
  background:transparent;border:none;
  color:var(--tx);cursor:pointer;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4.5px;
  flex-shrink:0;transition:background .15s;padding:0;
}
#menu-btn:hover{background:rgba(139,111,255,.1);}
#menu-btn:active{background:rgba(139,111,255,.15);transform:scale(.93);}
.bar{width:16px;height:1.8px;background:var(--tx);border-radius:2px;transition:all .25s cubic-bezier(.4,0,.2,1);}
#menu-btn.open .bar:nth-child(1){transform:translateY(6.3px) rotate(45deg);}
#menu-btn.open .bar:nth-child(2){opacity:0;transform:scaleX(0);}
#menu-btn.open .bar:nth-child(3){transform:translateY(-6.3px) rotate(-45deg);}

/* Badge module actif — seul élément central sur mobile */
#active-badge{
  flex:1;
  font-size:12px;font-weight:600;
  color:var(--tx);letter-spacing:.1px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
#active-badge .badge-dot{
  display:inline-block;width:6px;height:6px;border-radius:50%;
  background:linear-gradient(var(--a1),var(--a2));
  margin-right:7px;vertical-align:middle;
  position:relative;top:-1px;
}

/* ═══════════════════════════
   OVERLAY
═══════════════════════════ */
#menu-overlay{
  position:fixed;inset:0;z-index:398;
  background:rgba(0,0,0,.72);
  backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
  opacity:0;pointer-events:none;
  transition:opacity .28s ease;
}
#menu-overlay.open{opacity:1;pointer-events:all;}

/* ═══════════════════════════
   DRAWER / SIDEBAR
═══════════════════════════ */
#menu-panel{
  position:fixed;top:0;left:0;
  height:100%;width:var(--drawer);
  background:var(--surf);
  border-right:1px solid var(--bord);
  z-index:399;
  transform:translateX(-100%);
  transition:transform .3s cubic-bezier(.4,0,.2,1);
  pointer-events:none;
  display:flex;flex-direction:column;
  overflow:hidden;
  box-shadow:12px 0 40px rgba(0,0,0,.6);
}
#menu-panel.open{transform:translateX(0);pointer-events:all;}

/* En-tête drawer — compact */
.d-hdr{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 14px 12px;
  border-bottom:1px solid var(--bord);
  flex-shrink:0;
}
.d-logo{
  display:flex;align-items:center;gap:8px;
}
.d-logo-text{
  font-family:var(--fd);font-size:17px;font-weight:800;letter-spacing:-.3px;
  background:linear-gradient(135deg,var(--a1),var(--a2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  line-height:1;
}
.d-logo-badge{
  font-size:9px;font-weight:700;padding:2px 6px;
  border-radius:6px;background:rgba(139,111,255,.12);
  border:1px solid rgba(139,111,255,.2);color:var(--a1);
  white-space:nowrap;
}
.d-close{
  width:28px;height:28px;border-radius:7px;
  background:rgba(255,255,255,.04);border:1px solid var(--bord);
  color:var(--mu);cursor:pointer;font-size:13px;
  display:flex;align-items:center;justify-content:center;
  transition:all .15s;flex-shrink:0;
}
.d-close:hover{background:rgba(255,255,255,.08);color:var(--tx);}
.d-close:active{transform:scale(.9);}

/* Label section */
.d-label{
  padding:10px 14px 5px;
  font-size:9px;font-weight:700;text-transform:uppercase;
  letter-spacing:1.6px;color:var(--mu);flex-shrink:0;
}

/* Liste modules */
.menu-grid{
  display:flex;flex-direction:column;
  gap:1px;padding:0 6px;
  flex:1;overflow-y:auto;scrollbar-width:none;
}
.menu-grid::-webkit-scrollbar{display:none}

/* Item module */
.menu-item{
  display:flex;align-items:center;gap:10px;
  padding:9px 10px;border-radius:var(--radius);
  border:none;background:transparent;
  color:var(--mu);cursor:pointer;
  font-family:var(--fb);text-align:left;
  transition:all .12s;width:100%;
  position:relative;
}
.menu-item:hover{background:rgba(255,255,255,.04);color:var(--tx);}
.menu-item:active{transform:scale(.98);}
.menu-item.on{background:rgba(139,111,255,.1);color:var(--tx);}
.menu-item.on::before{
  content:'';position:absolute;left:0;top:25%;bottom:25%;
  width:2.5px;border-radius:2px;
  background:linear-gradient(var(--a1),var(--a2));
}

/* Icône */
.mi-icon{
  width:32px;height:32px;border-radius:8px;
  background:rgba(255,255,255,.04);
  border:1px solid var(--bord);
  display:flex;align-items:center;justify-content:center;
  font-size:16px;flex-shrink:0;transition:all .12s;
}
.menu-item.on .mi-icon{
  background:rgba(139,111,255,.15);
  border-color:rgba(139,111,255,.25);
}

/* Texte */
.mi-info{display:flex;flex-direction:column;gap:0px;flex:1;min-width:0;}
.mi-name{font-size:12.5px;font-weight:700;color:inherit;line-height:1.3;}
.mi-sub{font-size:9.5px;color:var(--mu);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.4;}
.menu-item.on .mi-name{color:var(--a1);}

/* Badge bientôt */
.soon-tag{
  font-size:7.5px;font-weight:700;padding:2px 6px;border-radius:5px;
  background:rgba(255,190,92,.08);border:1px solid rgba(255,190,92,.18);
  color:rgba(255,190,92,.7);flex-shrink:0;
}

/* Pied */
.d-footer{
  padding:10px 14px 12px;
  border-top:1px solid var(--bord);flex-shrink:0;
  display:flex;align-items:center;gap:6px;
}
.d-footer-dot{width:5px;height:5px;border-radius:50%;background:var(--mu);flex-shrink:0;}
.d-footer-txt{font-size:9.5px;color:var(--mu);}

/* ═══════════════════════════
   BOUTON ROUVRIR SIDEBAR (PC replié)
═══════════════════════════ */
#pc-reopen{
  display:none;
  position:fixed;top:50%;left:0;transform:translateY(-50%);
  width:18px;height:48px;
  background:var(--surf);border:1px solid var(--bord);
  border-left:none;border-radius:0 8px 8px 0;
  color:var(--mu);font-size:11px;cursor:pointer;
  align-items:center;justify-content:center;
  z-index:500;transition:all .18s;
}
#pc-reopen:hover{background:var(--card);color:var(--a1);width:22px;}

/* ═══════════════════════════
   FRAME
═══════════════════════════ */
#frame-wrap{
  flex:1;position:relative;
  overflow:hidden;min-height:0;
}
#main-frame{
  position:absolute;inset:0;
  width:100%;height:100%;
  border:none;display:block;
}

/* Placeholder */
#placeholder{
  position:absolute;inset:0;display:none;flex-direction:column;
  align-items:center;justify-content:center;
  background:var(--bg);padding:32px;text-align:center;
}
#placeholder.on{display:flex;}
.ph-e{font-size:56px;margin-bottom:12px;}
.ph-t{font-family:var(--fd);font-size:20px;font-weight:800;margin-bottom:6px;}
.ph-s{font-size:12px;color:var(--mu);line-height:1.6;max-width:240px;}
.ph-b{
  margin-top:16px;display:inline-flex;align-items:center;gap:5px;
  background:rgba(255,190,92,.08);border:1px solid rgba(255,190,92,.2);
  border-radius:16px;padding:5px 12px;font-size:10px;font-weight:700;color:#ffbe5c;
}
@keyframes phD{0%{content:'.'}33%{content:'..'}66%{content:'...'}100%{content:'.'}}
.ph-d::after{content:'.';animation:phD 1.2s infinite;}

/* ═══════════════════════════
   PC ≥ 768px — SIDEBAR PERMANENTE
═══════════════════════════ */
@media(min-width:768px){
  #shell{flex-direction:row;}
  #hdr{display:none;}
  #menu-overlay{display:none!important;}

  #menu-panel{
    position:relative;
    transform:none!important;pointer-events:all!important;
    width:var(--side);height:100%;
    flex-shrink:0;box-shadow:none;
    border-right:1px solid var(--bord);
    transition:width .28s cubic-bezier(.4,0,.2,1);
    overflow:hidden;
  }

  /* Bouton ‹ visible sur PC */
  .d-close{display:flex;font-size:12px;}

  /* Header sidebar plus sobre */
  .d-hdr{padding:16px 12px 12px;}
  .d-logo-text{font-size:16px;}
  .d-label{padding:8px 12px 4px;}
  .menu-grid{padding:0 4px;}
  .menu-item{padding:8px 10px;}

  #frame-wrap{flex:1;min-width:0;}

  /* Replié */
  #menu-panel.pc-collapsed{width:0;border-right:none;}
  #shell.pc-collapsed #pc-reopen{display:flex;}
}
</style>
</head>
<body>
<div id="shell">

  <button id="pc-reopen" onclick="openPCSidebar()" aria-label="Ouvrir">›</button>

  <!-- HEADER MOBILE -->
  <header id="hdr">
    <button id="menu-btn" onclick="toggleMenu()" aria-label="Menu">
      <div class="bar"></div><div class="bar"></div><div class="bar"></div>
    </button>
    <div id="active-badge">
      <span class="badge-dot"></span><span id="badge-label">Accueil</span>
    </div>
  </header>

  <!-- OVERLAY -->
  <div id="menu-overlay" onclick="closeMenu()"></div>

  <!-- DRAWER / SIDEBAR -->
  <div id="menu-panel" role="navigation">
    <div class="d-hdr">
      <div class="d-logo">
        <div class="d-logo-text">ScolarIA</div>
        <div class="d-logo-badge">3ème</div>
      </div>
      <button class="d-close" id="d-close-btn" onclick="isPC()?closePCSidebar():closeMenu()">✕</button>
    </div>

    <div class="d-label">Modules</div>

    <div class="menu-grid">

      <button class="menu-item on"
        data-src="scolaria tel.html" data-label="Accueil" data-exists="true"
        onclick="switchMode(this)">
        <div class="mi-icon">🏠</div>
        <div class="mi-info">
          <span class="mi-name">Accueil</span>
          <span class="mi-sub">Chat · Devoirs · Flashcards</span>
        </div>
      </button>

      <button class="menu-item"
        data-src="scolaria-langues.html" data-label="Langues" data-exists="true"
        onclick="switchMode(this)">
        <div class="mi-icon">🌍</div>
        <div class="mi-info">
          <span class="mi-name">Langues</span>
          <span class="mi-sub">EN · ES · Parcours</span>
        </div>
      </button>

      <button class="menu-item"
        data-src="scolaria-sciences.html" data-label="Sciences" data-exists="true"
        onclick="switchMode(this)">
        <div class="mi-icon">🔬</div>
        <div class="mi-info">
          <span class="mi-name">Sciences</span>
          <span class="mi-sub">Labo · Formules</span>
        </div>
      </button>

      <button class="menu-item soon"
        data-src="scolaria-maths.html" data-label="Maths" data-exists="false"
        onclick="switchMode(this)">
        <div class="mi-icon">📐</div>
        <div class="mi-info">
          <span class="mi-name">Maths</span>
          <span class="mi-sub">Géométrie · Algèbre</span>
        </div>
        <span class="soon-tag">Bientôt</span>
      </button>

      <button class="menu-item soon"
        data-src="scolaria-histoire.html" data-label="Histoire" data-exists="false"
        onclick="switchMode(this)">
        <div class="mi-icon">📜</div>
        <div class="mi-info">
          <span class="mi-name">Histoire</span>
          <span class="mi-sub">Frise · Dates clés</span>
        </div>
        <span class="soon-tag">Bientôt</span>
      </button>

      <button class="menu-item soon"
        data-src="scolaria-art.html" data-label="Art" data-exists="false"
        onclick="switchMode(this)">
        <div class="mi-icon">🎨</div>
        <div class="mi-info">
          <span class="mi-name">Art</span>
          <span class="mi-sub">Œuvres · Analyse</span>
        </div>
        <span class="soon-tag">Bientôt</span>
      </button>

    </div>

    <div class="d-footer">
      <div class="d-footer-dot"></div>
      <span class="d-footer-txt">ScolarIA v2 · Niveau 3ème</span>
    </div>
  </div>

  <!-- CONTENU -->
  <div id="frame-wrap">
    <iframe id="main-frame" src="scolaria tel.html" title="ScolarIA" scrolling="no"></iframe>
    <div id="placeholder">
      <div class="ph-e" id="ph-e">🚧</div>
      <div class="ph-t" id="ph-t">Bientôt dispo</div>
      <div class="ph-s">Ce module arrive très bientôt !</div>
      <div class="ph-b">⏳ En construction<span class="ph-d"></span></div>
    </div>
  </div>

</div>
<script>
var frame    = document.getElementById('main-frame');
var ph       = document.getElementById('placeholder');
var panel    = document.getElementById('menu-panel');
var btn      = document.getElementById('menu-btn');
var overlay  = document.getElementById('menu-overlay');
var badge    = document.getElementById('badge-label');
var shell    = document.getElementById('shell');
var closeBtn = document.getElementById('d-close-btn');

function isPC(){ return window.innerWidth >= 768; }

/* ── PC sidebar ── */
function closePCSidebar(){ panel.classList.add('pc-collapsed'); shell.classList.add('pc-collapsed'); }
function openPCSidebar(){ panel.classList.remove('pc-collapsed'); shell.classList.remove('pc-collapsed'); }

/* ── Mobile drawer ── */
function toggleMenu(){ if(isPC()) return; panel.classList.contains('open') ? closeMenu() : openMenu(); }
function openMenu(){ panel.classList.add('open'); btn.classList.add('open'); overlay.classList.add('open'); }
function closeMenu(){ panel.classList.remove('open'); btn.classList.remove('open'); overlay.classList.remove('open'); }

/* ── Switch module ── */
function switchMode(el){
  var src = el.dataset.src, exists = el.dataset.exists === 'true';
  document.querySelectorAll('.menu-item').forEach(function(b){ b.classList.remove('on'); });
  el.classList.add('on');
  badge.textContent = el.dataset.label;
  closeMenu();
  if(!exists){
    frame.style.display = 'none'; ph.classList.add('on');
    document.getElementById('ph-e').textContent = el.querySelector('.mi-icon').textContent;
    document.getElementById('ph-t').textContent = el.querySelector('.mi-name').textContent;
  } else {
    ph.classList.remove('on'); frame.style.display = 'block';
    if(frame.src.split('/').pop().split('?')[0] !== src) frame.src = src;
  }
}

/* ── Icône bouton fermer ── */
function updateIcon(){ if(closeBtn) closeBtn.textContent = isPC() ? '‹' : '✕'; }
updateIcon();
window.addEventListener('resize', updateIcon);
document.addEventListener('keydown', function(e){ if(e.key==='Escape'){ isPC()?closePCSidebar():closeMenu(); } });
</script>
</body>
</html>
